name: Build LobeChat (Docker + Windows)

on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker tag'
        required: false
        type: string
        default: 'latest'
      
      version:
        description: 'Version number (e.g., 2.1.45-hardy.1)'
        required: false
        type: string

env:
  NODE_VERSION: '24.11.1'
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/lobehub
  SOURCE_REPO: hardy-one/lobehub
  SOURCE_BRANCH: next

jobs:
  calculate-version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    
    steps:
      # ✅ 手动指定版本时使用
      - name: Use manual version
        if: ${{ inputs.version != '' && inputs.version != null }}
        id: version_manual
        run: |
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          echo "tag=v${{ inputs.version }}" >> $GITHUB_OUTPUT

      # ✅ 自动计算版本：基于官方 lobehub 的 stable tag
      - name: Calculate hardy version from official lobehub tags
        if: ${{ inputs.version == '' || inputs.version == null }}
        id: version_auto
        run: |
          # 从官方 lobehub/lobehub 获取最新 stable tag
          response=$(curl -s "https://api.github.com/repos/lobehub/lobehub/tags?per_page=100")
          latest_tag=$(echo "$response" | grep -oE '"name":\s*"v[0-9]+\.[0-9]+\.[0-9]+"' | head -1 | sed 's/.*"v\([0-9.]*\)".*/v\1/')
          
          if [ -z "$latest_tag" ]; then
            echo "❌ No stable tag found, using fallback"
            version="2.1.45-hardy.${{ github.run_number }}"
          else
            echo "📌 Latest official stable tag: $latest_tag"
            
            # 解析版本号
            base_version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$base_version"
            
            # 基于官方版本 +1 作为 hardy base
            new_patch=$((patch + 1))
            base_hardy="${major}.${minor}.${new_patch}"
            
            # hardy 序号使用 run_number
            version="${base_hardy}-hardy.${{ github.run_number }}"
          fi

          tag="v${version}"
          echo "✅ Hardy version: ${version}"
          echo "🏷️ Tag: ${tag}"
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "tag=${tag}" >> $GITHUB_OUTPUT

      - name: Set version output
        id: version
        run: |
          if [ -n "${{ steps.version_manual.outputs.version }}" ]; then
            echo "version=${{ steps.version_manual.outputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=${{ steps.version_manual.outputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ steps.version_auto.outputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=${{ steps.version_auto.outputs.tag }}" >> $GITHUB_OUTPUT
          fi

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [calculate-version]
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_BRANCH }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_ENABLE_BETTER_AUTH=1
            NEXT_PUBLIC_ENABLE_NEXT_AUTH=0
          tags: |
            ${{ env.IMAGE_NAME }}:${{ inputs.docker_tag }}
            ${{ env.IMAGE_NAME }}:${{ needs.calculate-version.outputs.version }}
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

  build-windows:
    name: Build Windows Desktop
    runs-on: windows-2025
    needs: [calculate-version]
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_BRANCH }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --node-linker=hoisted

      - name: Remove China electron mirror
        shell: bash
        run: |
          if [ -f "./apps/desktop/.npmrc" ]; then
            sed -i.bak '/^electron_mirror=/d; /^electron_builder_binaries_mirror=/d' "./apps/desktop/.npmrc"
            rm -f "./apps/desktop/.npmrc.bak"
          fi

      - name: Install deps on Desktop
        run: npm run install-isolated --prefix=./apps/desktop

      # ✅ 设置版本号（格式：X.Y.Z-hardy.N）
      - name: Set package version
        run: npm run workflow:set-desktop-version ${{ needs.calculate-version.outputs.version }} hardy

      - name: Build Windows App
        run: npm run desktop:package:app
        env:
          UPDATE_CHANNEL: hardy
          UPDATE_SERVER_URL: ${{ secrets.UPDATE_SERVER_URL }}
          APP_URL: http://localhost:3015
          DATABASE_URL: 'postgresql://postgres@localhost:5432/postgres'
          KEY_VAULTS_SECRET: 'oLXWIiR/AKF+rWaqy9lHkrYgzpATbW3CtJp3UfkVgpE='
          NEXT_PUBLIC_DESKTOP_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_DESKTOP_PROJECT_ID }}
          NEXT_PUBLIC_DESKTOP_UMAMI_BASE_URL: ${{ secrets.NEXT_PUBLIC_DESKTOP_UMAMI_BASE_URL }}
          TEMP: C:\temp
          TMP: C:\temp

      - name: List release directory
        shell: pwsh
        run: |
          Write-Host "============================================================"
          Write-Host "  release 目录内容"
          Write-Host "============================================================"
          if (Test-Path apps/desktop/release) {
            Get-ChildItem -Path apps/desktop/release -File | Format-Table Name, Length -AutoSize
          } else {
            Write-Host "❌ release 目录不存在！"
          }
          Write-Host "============================================================"

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-windows
          path: apps/desktop/release/
          retention-days: 3

      # ✅ 更新 action 版本到 v2.6.1（支持 Node.js 24）
      - name: Create Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ needs.calculate-version.outputs.tag }}
          name: ${{ needs.calculate-version.outputs.tag }}
          body: |
            ## 🔨 Hardy Build — ${{ needs.calculate-version.outputs.tag }}

            > Custom build from `${{ env.SOURCE_BRANCH }}` branch of `${{ env.SOURCE_REPO }}`.

            ### ⚠️ Important Notes
            - This is a custom hardy build and is NOT intended for production use.
            - May contain unstable or incomplete changes. Use at your own risk.
          files: |
            apps/desktop/release/*-setup.exe
            apps/desktop/release/latest*.yml 
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
